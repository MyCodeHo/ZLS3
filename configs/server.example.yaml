# MiniS3 Server Configuration
# 服务监听配置
server:
  listen_ip: "0.0.0.0"
  listen_port: 8080
  io_threads: 4
  worker_threads: 8
  recv_buffer_size: 1048576
  send_buffer_size: 1048576

# 存储路径配置
storage:
  data_dir: "/var/lib/minis3/data"
  tmp_dir: "/var/lib/minis3/tmp"

# MySQL 配置
mysql:
  host: "127.0.0.1"
  port: 3306
  user: "minis3"
  password: "minis3_password"
  database: "minis3"
  pool_size: 16
  connect_timeout: 5
  read_timeout: 30

# 认证配置
auth:
  enabled: true
  static_tokens:
    - "dev-token-12345"

# 限流与资源限制
limits:
  max_body_bytes: 5368709120  # 5GB
  max_header_bytes: 8192
  max_concurrent_uploads: 100
  max_concurrent_downloads: 500
  connection_idle_timeout: 60
  request_timeout: 3600

# 分片上传配置
multipart:
  min_part_size: 5242880  # 5MB
  max_part_number: 10000
  expire_hours: 24

# 日志配置
log:
  level: "info"
  access_log_path: "/var/log/minis3/access.log"
  error_log_path: "/var/log/minis3/error.log"
  json_format: true

# 指标配置
metrics:
  enabled: true
  listen_port: 9090
  path: "/metrics"

# GC 配置
gc:
  enabled: true
  interval_seconds: 300
  batch_size: 100
